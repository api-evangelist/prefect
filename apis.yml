- aid: prefect:prefect-cloud-rest-api
  name: Prefect Cloud REST API
  description: The Prefect Cloud REST API provides programmatic access to Prefect Cloud for orchestrating and managing workflows,
    deployments, flow runs, task runs, artifacts, and automations. The API follows RESTful conventions with pluralized collection
    names, snake_case route names, and supports an OpenAPI 3.0 compliant specification. Clients authenticate using API keys
    passed as Bearer tokens in request headers.
  humanURL: https://docs.prefect.io/v3/api-ref/rest-api
