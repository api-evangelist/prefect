aid: prefect
name: Prefect
segments:
- Workflows
description: Prefect is a Python-native workflow orchestration tool for building, scheduling, and monitoring data pipelines
  with fault tolerance. Prefect provides a hybrid execution model where the cloud control plane coordinates workflows while
  code and data remain in customer infrastructure, offering both a managed cloud platform and a self-hosted open-source server.
