- aid: prefect:prefect-server-rest-api
  name: Prefect Server REST API
  description: The Prefect Server REST API is the self-hosted variant of the Prefect orchestration API for managing workflows,
    flow runs, task runs, deployments, and work pools. When running Prefect server locally, the API is available at http://localhost:4200/api
    and interactive documentation is served at the /docs endpoint. The API can be fully described with an OpenAPI 3.0 compliant
    document generated from the running server.
  humanURL: https://docs.prefect.io/v3/api-ref/rest-api
  tags:
  - Open Source
  - Orchestration
  - REST API
  - Self-Hosted
  - Workflows
  properties:
  - type: Documentation
    url: https://docs.prefect.io/v3/api-ref/rest-api
  - type: APIReference
    url: https://docs.prefect.io/latest/api-ref/rest-api-reference/
  - type: GettingStarted
    url: https://docs.prefect.io/v3/get-started/quickstart
  - type: GitHubRepository
    url: https://github.com/PrefectHQ/prefect
- aid: prefect:prefect-python-sdk
  name: Prefect Python SDK
  description: The Prefect Python SDK is used to build, test, and execute workflows against the Prefect API. It provides decorators
    such as @flow and @task for defining workflows, along with programmatic interfaces for deployments, scheduling, state
    management, concurrency, caching, and retries. The SDK requires Python 3.10 or higher and includes a PrefectClient class
    for direct interaction with the REST API.
  humanURL: https://docs.prefect.io/v3/api-ref/python
  tags:
  - Orchestration
  - Python
  - SDK
  - Workflows
