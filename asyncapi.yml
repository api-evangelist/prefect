  # ------------------------------------------------------------------
  # Outbound automation actions toward external systems.
  # ------------------------------------------------------------------
  outbound/send-notification:
    description: >-
      Outbound notification delivered by the `send-notification` automation
      action through a configured notification block. Block types documented
      by Prefect are Slack, Microsoft Teams, and Email. Exact body shape is
      defined by the chosen block.
    subscribe:
      operationId: onAutomationSendNotification
      summary: send-notification automation action.
      message:
        $ref: '#/components/messages/AutomationSendNotification'

  outbound/call-webhook:
    description: >-
      Outbound HTTP webhook delivery emitted by the `call-webhook` automation
      action to a customer-configured URL. The public Prefect documentation
      lists `call-webhook` as one of the sixteen action types but does not
      specify the exact request method, headers, or body, so the payload is
      modeled as an open object.
    subscribe:
      operationId: onAutomationCallWebhook
      summary: call-webhook automation action.
      message:
        $ref: '#/components/messages/AutomationCallWebhook'

components:

  messages:

    InboundWebhookRequest:
      name: inbound_webhook_request
