asyncapi: '2.6.0'
info:
  title: Prefect Cloud Webhooks and Events
  version: '1.0.0'
  description: >-
    AsyncAPI 2.6 description of Prefect Cloud's webhook and event-streaming
    surfaces. Prefect Cloud exposes two complementary asynchronous surfaces:

      1. Inbound webhooks. Each Prefect Cloud webhook is rooted at
         `https://api.prefect.cloud/hooks/<opaque-slug>` and accepts GET, HEAD,
         and DELETE requests (for static templates) or POST, PUT, and PATCH
         requests (when the webhook reads a request body). On receipt, Prefect
         renders a Jinja2 template against the request method, headers, and
         body and emits a Prefect Event into the workspace event stream. The
         emitted event is automatically annotated with `occurred`, `id`, and a
         related resource that points to the receiving webhook.

      2. Outbound notifications driven by Automations. Automations match a
         trigger condition against the event stream and execute one of the
         sixteen documented action types. The external-facing actions are
         `send-notification` (delivered through a configured Slack, Microsoft
         Teams, or Email block) and `call-webhook` (HTTP delivery to a
         customer-configured URL). The remaining fourteen action types are
         internal control-plane operations against flow runs, deployments,
         work pools, work queues, and other automations.

    Every fired automation also re-enters the event stream as
    `prefect.automation.triggered`, `prefect.automation.resolved`,
    `prefect.automation.action.triggered`, `prefect.automation.action.executed`,
    and `prefect.automation.action.failed` events, allowing downstream
    automations or external consumers (via webhooks) to observe automation
    lifecycle.

    Event names and event-resource conventions in this document are taken
    verbatim from the Prefect documentation; payload shapes for end-user
    notification channels and for the `call-webhook` action are intentionally
    left open because the public documentation does not specify them.
  contact:
    name: Prefect Documentation
    url: https://docs.prefect.io/v3/concepts/automations
  license:
    name: Proprietary - Prefect Technologies, Inc.
    url: https://www.prefect.io/legal/terms
  x-source-references:
    - https://docs.prefect.io/v3/concepts/webhooks
    - https://docs.prefect.io/v3/concepts/automations
    - https://docs.prefect.io/v3/concepts/automations#webhooks
    - https://docs.prefect.io/v3/concepts/events
    - https://docs.prefect.io/v3/api-ref/events

defaultContentType: application/json

servers:
  prefectCloudWebhookIngress:
    url: api.prefect.cloud
    protocol: https
    description: >-
      Prefect Cloud webhook ingress. Each workspace webhook receives HTTP
      requests at `https://api.prefect.cloud/hooks/<slug>`, where `<slug>` is
      an opaque, randomly generated identifier assigned by Prefect at webhook
      creation. The slug cannot be customized but may be rotated. Successful
      processing returns `204 No Content`; template or processing errors
      return `400 Bad Request` and emit a `prefect-cloud.webhook.failed`
      event in the workspace event feed.
  subscriber:
    url: '{endpointUrl}'
    protocol: https
    description: >-
      Customer-hosted HTTPS endpoint that Prefect Cloud calls when an
      automation runs the `call-webhook` action, or that a customer integrates
      with to receive `send-notification` deliveries through configured Slack,
      Microsoft Teams, or Email blocks. Concrete payload and header shapes are
      determined by the configured automation block and are not specified by
      public Prefect documentation.
    variables:
      endpointUrl:
        description: Fully qualified HTTPS URL of the subscriber endpoint.
        default: https://example.com/prefect/webhook

channels:

  # ------------------------------------------------------------------
  # Inbound: HTTP request received at a Prefect Cloud webhook slug.
  # ------------------------------------------------------------------
  'hooks/{webhookSlug}':
    description: >-
      Inbound webhook endpoint. External systems POST, PUT, PATCH, GET, HEAD,
      or DELETE here; Prefect renders the webhook's Jinja2 template against
      the request method, headers (Authorization header is stripped), and
      body (JSON, form-encoded, or string) to produce a Prefect Event.
    parameters:
      webhookSlug:
        description: >-
          Opaque, randomly generated webhook identifier assigned by Prefect
          Cloud at creation time (example shape: `AERylZ_uewzpDx-8fcweHQ`).
        schema:
          type: string
    publish:
      operationId: receiveInboundWebhookRequest
      summary: External system delivers an HTTP request to a workspace webhook slug.
      message:
        $ref: '#/components/messages/InboundWebhookRequest'

  # ------------------------------------------------------------------
  # Event stream: events emitted into the Prefect workspace event feed.
  # ------------------------------------------------------------------
  events/prefect-cloud.webhook.failed:
    description: >-
      Emitted when a received webhook request fails template rendering or
      validation. Visible in the workspace event feed.
    subscribe:
      operationId: onPrefectCloudWebhookFailed
      summary: prefect-cloud.webhook.failed event.
      message:
        $ref: '#/components/messages/PrefectCloudWebhookFailed'

  events/prefect.flow-run.state:
    description: >-
      Flow run state-transition events. The state name is interpolated into
      the event name (for example `prefect.flow-run.Completed`,
      `prefect.flow-run.Failed`).
    subscribe:
      operationId: onPrefectFlowRunStateChanged
      summary: prefect.flow-run.{state} event.
      message:
        $ref: '#/components/messages/PrefectFlowRunStateChanged'

  events/prefect.flow-run.heartbeat:
    description: Periodic liveness signal emitted by a running flow run.
    subscribe:
      operationId: onPrefectFlowRunHeartbeat
      summary: prefect.flow-run.heartbeat event.
      message:
        $ref: '#/components/messages/PrefectFlowRunHeartbeat'

  events/prefect.flow-run.pull-step.executed:
    description: A deployment pull step executed successfully for a flow run.
    subscribe:
      operationId: onPrefectFlowRunPullStepExecuted
      summary: prefect.flow-run.pull-step.executed event.
      message:
        $ref: '#/components/messages/PrefectFlowRunPullStepExecuted'

  events/prefect.flow-run.pull-step.failed:
