      title: Prefect Workspace Transfer Completed
      summary: A workspace transfer completed.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/PrefectEvent'

    PrefectDockerContainerStatus:
      name: prefect.docker.container.status
      title: Prefect Docker Container Status
      summary: Docker container status event emitted by Prefect integrations.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/PrefectEvent'

    PrefectKubernetesPodPhase:
      name: prefect.kubernetes.pod.phase
      title: Prefect Kubernetes Pod Phase
      summary: Kubernetes pod phase event emitted by Prefect integrations.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/PrefectEvent'

    PrefectEcsTaskStatus:
      name: prefect.ecs.task.status
      title: Prefect ECS Task Status
      summary: Amazon ECS task status event emitted by Prefect integrations.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/PrefectEvent'

    AutomationSendNotification:
      name: send-notification
      title: Automation Send Notification
      summary: >-
        Outbound notification delivered through a configured notification
        block (Slack, Microsoft Teams, or Email).
      contentType: application/json
      payload:
        $ref: '#/components/schemas/AutomationNotificationDelivery'

    AutomationCallWebhook:
      name: call-webhook
      title: Automation Call Webhook
      summary: >-
        Outbound HTTP webhook delivery emitted by the `call-webhook` automation
        action.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/AutomationWebhookDelivery'

  schemas:

    InboundWebhookRequest:
      type: object
      description: >-
        HTTP request as received at `https://api.prefect.cloud/hooks/<slug>`.
        Prefect makes the method, headers (with the Authorization header
        removed), and parsed body available to the Jinja2 template that the
        webhook owner has configured. The template must produce, at minimum,
        an `event` name and `resource["prefect.resource.id"]` value; Prefect
        fills in `occurred`, `id`, and the related webhook resource. A
        successful request returns 204 No Content; failures return 400 and
        emit `prefect-cloud.webhook.failed`.
      properties:
        method:
          type: string
          description: Uppercased HTTP method (GET, HEAD, DELETE, POST, PUT, PATCH).
          enum:
            - GET
            - HEAD
            - DELETE
            - POST
            - PUT
            - PATCH
        headers:
          type: object
          description: >-
            Case-insensitive map of request headers. The `Authorization`
            header is stripped by Prefect before being exposed to templates.
          additionalProperties:
            type: string
        body:
          description: >-
            Request body. `application/json` is parsed to an object/array,
            `application/x-www-form-urlencoded` is parsed to a key-value map,
            other content types are attempted as JSON first and then fall
            back to a raw string.
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items: {}
            - type: string

    PrefectEvent:
      type: object
      description: >-
        Prefect Event envelope as documented in the Events concept and Events
        API reference. Required fields are `occurred`, `event`, `resource`,
        and `id`; optional fields are `related`, `payload`, and `follows`.
      required:
        - occurred
        - event
        - resource
        - id
      properties:
        occurred:
          type: string
          format: date-time
          description: When the event happened.
        event:
          type: string
          description: >-
            Dot-delimited event name following the
            `[namespace].[resource-type].[action]` convention.
        id:
          type: string
          description: Client-provided identifier of this event.
        resource:
          $ref: '#/components/schemas/PrefectEventResource'
        related:
          type: array
          description: Additional resources involved in this event.
          items:
            $ref: '#/components/schemas/PrefectEventRelatedResource'
        payload:
          type: object
          description: Open-ended set of data describing what happened.
          additionalProperties: true
        follows:
          type: string
          description: Event ID of a known prior occurrence this event follows.

    PrefectEventResource:
      type: object
      description: >-
        Primary resource an event concerns. Identified by the required
        `prefect.resource.id` dot-delimited label. Additional labels are
        permitted and may be used as aggregation keys.
      required:
        - prefect.resource.id
      properties:
        prefect.resource.id:
          type: string
          description: >-
            Dot-delimited resource identifier (for example
            `prefect.flow-run.e3755d32-cec5-42ca-9bcd-af236e308ba6`,
            `prefect-cloud.automation.<id>.action.0`, or an author-defined
            value like `acme.user.kiki.elt_script_1`).
      additionalProperties:
        type: string

    PrefectEventRelatedResource:
      type: object
      description: >-
        Related resource entry. Carries `prefect.resource.id` and typically
        `prefect.resource.role` (for example `triggering-event` or
        `automation-triggered-event`).
      required:
        - prefect.resource.id
      properties:
        prefect.resource.id:
          type: string
          description: Dot-delimited identifier of the related resource.
        prefect.resource.role:
          type: string
          description: Role this related resource plays in the event.
      additionalProperties:
        type: string

    AutomationNotificationDelivery:
      type: object
      description: >-
        Outbound notification rendered by the `send-notification` automation
        action and delivered through a configured Slack, Microsoft Teams, or
        Email block. The exact transport payload is determined by the block
        implementation and is not specified in the public Prefect
        documentation; this schema therefore captures only the documented
        envelope semantics and leaves the body open.
      properties:
        block_type:
          type: string
          description: Notification block type used to deliver the message.
          enum:
            - slack
            - microsoft-teams
            - email
        body:
          type: object
          description: >-
            Block-specific message body. Shape is determined by the
            configured notification block; not specified in the public
            Prefect documentation.
          additionalProperties: true
        triggering_event:
          $ref: '#/components/schemas/PrefectEvent'
        automation_triggered_event:
          $ref: '#/components/schemas/PrefectEvent'

    AutomationWebhookDelivery:
      type: object
      description: >-
        Outbound webhook delivery produced by the `call-webhook` automation
        action. The action is documented as one of the sixteen automation
        action types; its exact HTTP method, headers, and body are not
        specified in the public Prefect documentation, so this schema is left
        open.
      additionalProperties: true

  securitySchemes:

    prefectApiKey:
      type: httpApiKey
      in: header
      name: Authorization
      description: >-
        Prefect Cloud API key bearer token used to authenticate calls to the
        Prefect Cloud REST API (`Authorization: Bearer <api-key>`), including
        the endpoints used to create and manage webhooks and automations.

    webhookServiceAccountAuth:
      type: httpApiKey
      in: header
      name: Authorization
      description: >-
        Optional service-account credential enforced on inbound webhook
        requests in Pro/Enterprise tiers. Callers include
        `Authorization: Bearer <api-key>`; Prefect validates and then strips
        the header before exposing the request to the Jinja2 template.
