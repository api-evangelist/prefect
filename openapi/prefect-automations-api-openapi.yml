            - $ref: '#/components/schemas/DeclareIncident'
            - $ref: '#/components/schemas/PauseWorkPool'
            - $ref: '#/components/schemas/ResumeWorkPool'
            - $ref: '#/components/schemas/SlaViolation'
            - $ref: '#/components/schemas/SendEmailNotification'
            - $ref: '#/components/schemas/SendPrefectNotification'
          type: array
          title: Actions On Trigger
          description: The actions to perform when an Automation goes into a triggered state
        actions_on_resolve:
          items:
            anyOf:
            - $ref: '#/components/schemas/DoNothing'
            - $ref: '#/components/schemas/RunDeployment'
            - $ref: '#/components/schemas/PauseDeployment'
            - $ref: '#/components/schemas/ResumeDeployment'
            - $ref: '#/components/schemas/PauseScheduleForFlowRun'
            - $ref: '#/components/schemas/ResumeSchedule'
            - $ref: '#/components/schemas/CancelFlowRun'
            - $ref: '#/components/schemas/ChangeFlowRunState'
            - $ref: '#/components/schemas/PauseWorkQueue'
            - $ref: '#/components/schemas/ResumeWorkQueue'
            - $ref: '#/components/schemas/SendNotification'
            - $ref: '#/components/schemas/CallWebhook'
            - $ref: '#/components/schemas/PauseAutomation'
            - $ref: '#/components/schemas/ResumeAutomation'
            - $ref: '#/components/schemas/SuspendFlowRun'
            - $ref: '#/components/schemas/ResumeFlowRun'
            - $ref: '#/components/schemas/DeclareIncident'
            - $ref: '#/components/schemas/PauseWorkPool'
            - $ref: '#/components/schemas/ResumeWorkPool'
            - $ref: '#/components/schemas/SlaViolation'
            - $ref: '#/components/schemas/SendEmailNotification'
            - $ref: '#/components/schemas/SendPrefectNotification'
          type: array
          title: Actions On Resolve
          description: The actions to perform when an Automation goes into a resolving state
        labels:
          anyOf:
          - additionalProperties:
              anyOf:
              - type: boolean
              - type: integer
              - type: number
              - type: string
            type: object
          - type: 'null'
          title: Labels
          description: Labels to apply to this automation
        tags:
          items:
            type: string
          type: array
          title: Tags
          description: A list of tags for the automation
          examples:
          - - tag-1
            - tag-2
        id:
          type: string
          format: uuid
          title: Id
        created:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Created
        updated:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Updated
        account:
          type: string
          format: uuid
          title: Account
          description: The Account to which this automation belongs
        workspace:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Workspace
          description: The Workspace to which this automation belongs
        actor:
          anyOf:
          - $ref: '#/components/schemas/ActorReference'
          - type: 'null'
          description: The Prefect Actor to use when running actions, defaulting to the Actor who created the Automation
      type: object
      required:
      - name
      - trigger
      - actions
      - account
      - workspace
      title: Automation
    DoNothing:
      properties:
        type:
          type: string
          const: do-nothing
          title: Type
          default: do-nothing
      type: object
      title: DoNothing
      description: Do nothing when an Automation is triggered
    AutomationPartialUpdate:
      properties:
        enabled:
          type: boolean
          title: Enabled
          description: Whether this automation will be evaluated
          default: true
      additionalProperties: false
      type: object
      title: AutomationPartialUpdate
    StateType:
      type: string
      enum:
      - SCHEDULED
      - PENDING
      - RUNNING
      - COMPLETED
      - FAILED
      - CANCELLED
      - CRASHED
      - PAUSED
      - CANCELLING
      title: StateType
      description: Enumeration of state types.
    ResumeWorkPool:
      properties:
        type:
          type: string
          const: resume-work-pool
          title: Type
          default: resume-work-pool
        source:
          type: string
          enum:
          - selected
          - inferred
          title: Source
          description: Whether this Action applies to a specific selected work pool (given by `work_pool_id`), or to a work pool that is inferred from the triggering event.  If the source is 'inferred', the `work_pool_id` may not be set.  If the source is 'selected', the `work_pool_id` must be set.
          default: selected
        work_pool_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Work Pool Id
          description: The identifier of the work pool to pause
      type: object
      title: ResumeWorkPool
      description: Resumes a Work Pool
    PauseAutomation:
      properties:
        type:
          type: string
          const: pause-automation
          title: Type
          default: pause-automation
        source:
          type: string
          enum:
          - selected
          - inferred
          title: Source
          description: Whether this Action applies to a specific selected automation (given by `automation_id`), or to an automation that is inferred from the triggering event.  If the source is 'inferred', the `automation_id` may not be set.  If the source is 'selected', the `automation_id` must be set.
          default: selected
        automation_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Automation Id
          description: The identifier of the automation to act on
      type: object
      title: PauseAutomation
      description: Pauses a Work Queue
    ResumeFlowRun:
      properties:
        type:
          type: string
          const: resume-flow-run
          title: Type
          default: resume-flow-run
      type: object
      title: ResumeFlowRun
      description: Resumes a paused or suspended flow run associated with the trigger
    DeclareIncident:
      properties:
        type:
          type: string
          const: declare-incident
          title: Type
          default: declare-incident
      type: object
      title: DeclareIncident
      description: Declares an incident for the triggering event
    SuspendFlowRun:
      properties:
        type:
          type: string
          const: suspend-flow-run
          title: Type
          default: suspend-flow-run
        force:
          type: boolean
          title: Force
          description: Force the state change, bypassing orchestration rules
          default: false
      type: object
      title: SuspendFlowRun
      description: Suspends a flow run associated with the trigger
    ResumeDeployment:
      properties:
        type:
          type: string
          const: resume-deployment
          title: Type
          default: resume-deployment
        source:
          type: string
          enum:
          - selected
          - inferred
          title: Source
          description: Whether this Action applies to a specific selected deployment (given by `deployment_id`), or to a deployment that is inferred from the triggering event.  If the source is 'inferred', the `deployment_id` may not be set.  If the source is 'selected', the `deployment_id` must be set.
          default: selected
        deployment_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Deployment Id
          description: The identifier of the deployment
      type: object
      title: ResumeDeployment
      description: Resumes the given Deployment
    ActorReference:
      properties:
        actor_id:
          type: string
          format: uuid
          title: Actor Id
          description: The ID of the Actor
        handle:
          type: string
          maxLength: 5000
          title: Handle
          description: The handle of the Actor
        user_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: User Id
          description: The user's ID, if the actor is a user
        bot_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Bot Id
          description: The service account's ID, if the actor is a service_account
      type: object
      required:
      - actor_id
      - handle
      title: ActorReference
