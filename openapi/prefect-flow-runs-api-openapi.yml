components:
  schemas:
    FlowRunFilterNextScheduledStartTime:
      properties:
        before_:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Before
          description: Only include flow runs with a next_scheduled_start_time or before this time
        after_:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: After
          description: Only include flow runs with a next_scheduled_start_time at or after this time
      additionalProperties: false
      type: object
      title: FlowRunFilterNextScheduledStartTime
      description: Filter by `FlowRun.next_scheduled_start_time`.
    WorkPoolFilterType:
      properties:
        any_:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Any
          description: A list of work pool types to include
      additionalProperties: false
      type: object
      title: WorkPoolFilterType
      description: Filter by `WorkPool.type`.
    DeploymentFilterCreatedBy:
      properties:
        operator:
          $ref: '#/components/schemas/prefect_cloud__orion__schemas__filters__Operator'
          description: Operator for combining filter criteria. Defaults to 'and_'.
          default: and_
        id_:
          anyOf:
          - items:
              type: string
              format: uuid
            type: array
          - type: 'null'
          title: Id
          description: A list of creator IDs to include
        type_:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Type
          description: A list of creator types to include
        is_null_:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Is Null
          description: If true, only include deployments without a creator
      additionalProperties: false
      type: object
      title: DeploymentFilterCreatedBy
      description: Filter by `Deployment.created_by`.
    FlowRunFilterParentTaskRunId:
      properties:
        operator:
          $ref: '#/components/schemas/prefect_cloud__orion__schemas__filters__Operator'
          description: Operator for combining filter criteria. Defaults to 'and_'.
          default: and_
        any_:
          anyOf:
          - items:
              type: string
              format: uuid
            type: array
          - type: 'null'
          title: Any
          description: A list of flow run parent_task_run_ids to include
        is_null_:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Is Null
          description: If true, only include flow runs without parent_task_run_id
      additionalProperties: false
      type: object
      title: FlowRunFilterParentTaskRunId
      description: Filter by `FlowRun.parent_task_run_id`.
    FlowRunCreate:
      properties:
        state:
          anyOf:
          - $ref: '#/components/schemas/StateCreate'
          - type: 'null'
          description: The state of the flow run to create
        name:
          type: string
          title: Name
          description: The name of the flow run. Defaults to a random slug if not specified.
          examples:
          - my-flow-run
        flow_id:
          type: string
          format: uuid
          title: Flow Id
          description: The id of the flow being run.
        flow_version:
          anyOf:
          - type: string
            maxLength: 5000
          - type: 'null'
          title: Flow Version
          description: The version of the flow being run.
        parameters:
          additionalProperties: true
          type: object
          title: Parameters
        context:
          additionalProperties: true
          type: object
          title: Context
          description: The context of the flow run.
        parent_task_run_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Parent Task Run Id
        infrastructure_document_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Infrastructure Document Id
        empirical_policy:
          $ref: '#/components/schemas/FlowRunPolicy'
          description: The empirical policy for the flow run.
        tags:
          items:
            type: string
          type: array
          title: Tags
          description: A list of tags for the flow run.
          examples:
          - - tag-1
            - tag-2
        labels:
          anyOf:
          - additionalProperties:
              anyOf:
              - type: boolean
              - type: integer
              - type: number
              - type: string
            type: object
          - type: 'null'
          title: Labels
          description: A dictionary of key-value labels. Values can be strings, numbers, or booleans.
          examples:
          - key: value1
            key2: 42
        idempotency_key:
          anyOf:
          - type: string
            maxLength: 5000
          - type: 'null'
          title: Idempotency Key
          description: An optional idempotency key. If a flow run with the same idempotency key has already been created, the existing flow run will be returned.
        work_pool_name:
          anyOf:
          - type: string
            maxLength: 5000
          - type: 'null'
          title: Work Pool Name
          description: The name of the work pool to run the flow run in.
        work_queue_name:
          anyOf:
          - type: string
            maxLength: 5000
          - type: 'null'
          title: Work Queue Name
          description: The name of the work queue to place the flow run in.
        job_variables:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Job Variables
          description: The job variables to use when setting up flow run infrastructure.
        deployment_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Deployment Id
          description: 'DEPRECATED: The id of the deployment associated with this flow run, if available.'
          deprecated: true
      additionalProperties: false
      type: object
      required:
      - flow_id
      title: FlowRunCreate
      description: Data used by the Orion API to create a flow run.
    DeploymentFilterName:
      properties:
        any_:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Any
          description: A list of deployment names to include
