  /api/accounts/{account_id}/workspaces/{workspace_id}/flow_runs/{id}/assets/materializations:
    get:
      tags:
      - Flow Runs
      summary: Get Flow Run Materializations
      description: 'Get all asset materializations within a flow run, including materializations

        from descendant task runs and subflow runs.


        Returns a historical snapshot of materializations as they occurred, with asset

        properties captured at materialization time (not current state).


        Required workspace scopes: `see_assets`'
      operationId: get_flow_run_materializations_api_accounts__account_id__workspaces__workspace_id__flow_runs__id__assets_materializations_get
      parameters:
      - name: workspace_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Workspace Id
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          description: The flow run id
          title: Id
        description: The flow run id
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Account Id
      - name: depth
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            minimum: 0
          - type: 'null'
          description: 'Optional depth limit based on execution hierarchy. depth=0: only the root flow run. depth=1: root + direct children (tasks and subflows). None: unlimited depth (default).'
          title: Depth
        description: 'Optional depth limit based on execution hierarchy. depth=0: only the root flow run. depth=1: root + direct children (tasks and subflows). None: unlimited depth (default).'
      - name: since
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          description: Only return materializations on or after this timestamp
          title: Since
        description: Only return materializations on or after this timestamp
      - name: until
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          description: Only return materializations on or before this timestamp
          title: Until
        description: Only return materializations on or before this timestamp
      - name: sort
        in: query
        required: false
        schema:
          enum:
          - asc
          - desc
          type: string
          description: Sort order by occurred time (asc or desc)
          default: desc
          title: Sort
        description: Sort order by occurred time (asc or desc)
      - name: x-prefect-api-version
        in: header
        required: false
        schema:
          type: string
          title: X-Prefect-Api-Version
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MaterializationEvent'
                title: Response Get Flow Run Materializations Api Accounts  Account Id  Workspaces  Workspace Id  Flow Runs  Id  Assets Materializations Get
        '422':
