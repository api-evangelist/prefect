        required: true
        schema:
          type: string
          format: uuid
          title: Workspace Id
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          description: The task run id
          title: Id
        description: The task run id
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Account Id
      - name: depth
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            minimum: 0
          - type: 'null'
          description: 'Optional depth limit based on execution hierarchy. depth=0: only the task run. depth=1: task run + its descendants. None: unlimited depth (default).'
          title: Depth
        description: 'Optional depth limit based on execution hierarchy. depth=0: only the task run. depth=1: task run + its descendants. None: unlimited depth (default).'
      - name: since
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          description: Only return materializations on or after this timestamp
          title: Since
        description: Only return materializations on or after this timestamp
      - name: until
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          description: Only return materializations on or before this timestamp
          title: Until
        description: Only return materializations on or before this timestamp
      - name: sort
        in: query
        required: false
        schema:
          enum:
          - asc
          - desc
          type: string
          description: Sort order by occurred time (asc or desc)
          default: desc
          title: Sort
